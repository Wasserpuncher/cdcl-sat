name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Test
        run: python -m pytest -q
      # Exit codes follow the SAT competition convention: 10 = SATISFIABLE,
      # 20 = UNSATISFIABLE. Both are successful runs, so the step has to say so
      # -- otherwise CI reads a correct UNSAT answer as a crashed process.
      - name: Every UNSAT answer must come with a proof that verifies
        run: |
          python -m cdcl php 6 && rc=0 || rc=$?
          test "$rc" -eq 20

      # The console blocks on the front page are run, and the numbers in them
      # are compared against what the commands actually print. A README that
      # quietly stops being true fails the build here.
      - name: The README must still tell the truth
        run: |
          pip install git+https://github.com/Wasserpuncher/readme-check
          readme-check README.md --no-color
